    .nav-item {

              <div key={post.id} className="cartoon-card bg-white rounded-3xl p-6 hover:bg-gray-50 transition-all cursor-pointer group">
                <div className="flex items-center justify-between mb-4">
                  <span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold">
                    {post.category}
                  </span>
                  <span className="text-gray-400 text-sm">{post.date}</span>
                </div>
                <h3 className="text-xl font-bold mb-3 text-gray-800 group-hover:text-blue-600 transition-colors line-clamp-2">
                  {post.title}
                </h3>
                <p className="text-gray-600 text-sm mb-4 line-clamp-3 leading-relaxed">{post.summary}</p>
                <div className="flex items-center justify-between">
                  <span className="text-gray-500 text-sm">👁️ {post.views.toLocaleString()} 阅读</span>
                  <a 
                    href="https://blog.csdn.net/Mr_charm" 
                    target="_blank" 
                    className="cartoon-btn bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-600"
                  >
                    阅读全文 →
                  </a>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const StockAnalysis = () => {
      const [date, setDate] = useState('2026-03-10');
      const [data, setData] = useState(null);
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      
      const generateData = (selectedDate) => {
        return {
          date: selectedDate,
          marketSentiment: Math.floor(Math.random() * 30) + 70,
          hotSectors: ["AI", "金融科技", "新能源", "半导体"],
          topStocks: ["股票A", "股票B", "股票C", "股票D", "股票E"],
          riskLevel: "中低",
          recommendation: "积极",
          trends: ["科技股上涨", "银行股稳定", "消费股回暖", "新能源活跃"],
          sixDimensions: {
            marketHeat: Math.floor(Math.random() * 30) + 70,
            capitalFlow: Math.floor(Math.random() * 40) + 60,
            sectorRotation: Math.floor(Math.random() * 35) + 65,
            riskIndex: Math.floor(Math.random() * 30) + 40,
            opportunityIndex: Math.floor(Math.random() * 25) + 75,
            sentimentIndex: Math.floor(Math.random() * 30) + 70
          }
        };
      };
      
      useEffect(() => {
        const newData = generateData(date);
        setData(newData);
      }, []);
      
      useEffect(() => {
        if (data && chartRef.current) {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
          
          const ctx = chartRef.current.getContext('2d');
          chartInstance.current = new Chart(ctx, {
            type: 'radar',
            data: {
              labels: ['市场热度', '资金流向', '板块轮动', '风险指数', '机会指数', '情绪指数'],
              datasets: [{
                label: '市场指标',
                data: Object.values(data.sixDimensions),
                backgroundColor: 'rgba(147, 51, 234, 0.2)',
                borderColor: 'rgba(147, 51, 234, 1)',
                borderWidth: 2,
                pointBackgroundColor: 'rgba(147, 51, 234, 1)',
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: 'rgba(147, 51, 234, 1)'
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                r: {
                  beginAtZero: true,
                  max: 100,
                  ticks: {
                    stepSize: 20
                  }
                }
              }
            }
          });
        }
      }, [data]);
      
      const handleAnalyze = () => {
        setData(generateData(date));
      };
      
      if (!data) return <div className="p-8 text-center text-2xl">📊 加载中...</div>;
      
      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="text-center mb-8">
            <h2 className="text-4xl md:text-5xl font-bold mb-4 text-gray-800">📈 股票分析模块</h2>
            <p className="text-gray-600 text-lg">A股短线复盘智能分析系统</p>
          </div>
          
          {/* Date Selector */}
          <div className="cartoon-card bg-white rounded-3xl p-6 mb-8">
            <div className="flex flex-wrap gap-4 items-center justify-center">
              <label className="font-bold text-lg text-gray-700">选择日期：</label>
              <input 
                type="date" 
                value={date}
                onChange={(e) => setDate(e.target.value)}
                className="cartoon-card px-4 py-3 rounded-xl text-lg"
              />
              <button 
                onClick={handleAnalyze}
                className="cartoon-btn bg-purple-500 text-white px-8 py-3 rounded-xl font-bold text-lg hover:bg-purple-600"
              >
                🔍 分析
              </button>
            </div>
          </div>
          
          {/* Radar Chart */}
          <div className="cartoon-card bg-white rounded-3xl p-6 mb-8">
            <h3 className="text-2xl font-bold mb-4 text-gray-800 text-center">📊 六大维度分析</h3>
            <div className="h-80 md:h-96">
              <canvas ref={chartRef}></canvas>
            </div>
          </div>
          
          {/* Six Dimensions Cards */}
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            {Object.entries(data.sixDimensions).map(([key, value]) => {
              const labels = {
                marketHeat: '市场热度',
                capitalFlow: '资金流向',
                sectorRotation: '板块轮动',
                riskIndex: '风险指数',
                opportunityIndex: '机会指数',
                sentimentIndex: '情绪指数'
              };
              const colors = {
                marketHeat: 'from-red-400 to-orange-400',
                capitalFlow: 'from-green-400 to-teal-400',
                sectorRotation: 'from-blue-400 to-indigo-400',
                riskIndex: 'from-yellow-400 to-red-400',
                opportunityIndex: 'from-purple-400 to-pink-400',
                sentimentIndex: 'from-cyan-400 to-blue-400'
              };
              return (
                <div key={key} className="cartoon-card bg-white rounded-2xl p-4 text-center">
                  <h4 className="text-gray-600 text-sm mb-2 font-semibold">{labels[key]}</h4>
                  <div className="text-4xl font-bold gradient-text mb-2">{value}</div>
                  <div className="progress-bar">
                    <div 
                      className={`progress-fill bg-gradient-to-r ${colors[key]}`}
                      style={{ width: `${value}%` }}
                    ></div>
                  </div>
                </div>
              );
            })}
          </div>
          
          {/* Hot Sectors & Trends */}
          <div className="grid md:grid-cols-2 gap-6 mb-8">
            <div className="cartoon-card bg-yellow-100 rounded-3xl p-6">
              <h3 className="text-2xl font-bold mb-4 text-gray-800">🔥 热门板块</h3>
              <div className="flex flex-wrap gap-3">
                {data.hotSectors.map((sector, idx) => (
                  <span key={idx} className="cartoon-btn bg-red-500 text-white px-4 py-2 rounded-full font-bold">
                    {sector}
                  </span>
                ))}
              </div>
              <h4 className="text-xl font-bold mt-6 mb-3 text-gray-800">📈 领涨个股</h4>
              <div className="flex flex-wrap gap-2">
                {data.topStocks.map((stock, idx) => (
                  <span key={idx} className="bg-white border-2 border-black px-3 py-1 rounded-full font-semibold">
                    {stock}
                  </span>
                ))}
              </div>
            </div>
            
            <div className="cartoon-card bg-green-100 rounded-3xl p-6">
              <h3 className="text-2xl font-bold mb-4 text-gray-800">📊 市场趋势</h3>
              <ul className="space-y-3">
                {data.trends.map((trend, idx) => (
                  <li key={idx} className="flex items-center gap-3 bg-white rounded-xl p-3 border-2 border-black">
                    <span className="text-2xl">{idx % 2 === 0 ? '📈' : '📉'}</span>
                    <span className="font-semibold text-gray-800">{trend}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>
          
          {/* Recommendation */}
          <div className="cartoon-card bg-gradient-to-r from-purple-100 to-pink-100 rounded-3xl p-8 text-center">
            <h3 className="text-2xl font-bold mb-4 text-gray-800">💡 投资建议</h3>
            <p className="text-4xl font-bold gradient-text mb-3">{data.recommendation}</p>
            <div className="flex justify-center gap-4 mt-4">
              <span className="bg-white px-4 py-2 rounded-full font-bold border-2 border-black">
                风险等级：{data.riskLevel}
              </span>
              <span className="bg-white px-4 py-2 rounded-full font-bold border-2 border-black">
                情绪指数：{data.marketSentiment}
              </span>
            </div>
          </div>
        </div>
      );
    };

    const Tools = () => {
      const [tomato, setTomato] = useState({ min: 25, sec: 0, running: false });
      const [quote, setQuote] = useState('');
      const [pomodoroCount, setPomodoroCount] = useState(0);
      
      const quotes = [
        "代码如诗，bug如歌 🎵",
        "保持好奇，持续学习 📚",
        "产品经理是翻译官 🌉",
        "数据驱动决策 📊",
        "简单是终极的复杂 ✨",
        "明日复明日，明日何其多 🌅",
        "早睡早起身体好 💪",
        "脾胃是后天之本 🍃"
      ];
      
      useEffect(() => {
        setQuote(quotes[Math.floor(Math.random() * quotes.length)]);
      }, []);
      
      useEffect(() => {
        let timer;
        if (tomato.running) {
          timer = setInterval(() => {
            setTomato(prev => {
              if (prev.sec > 0) return { ...prev, sec: prev.sec - 1 };
              if (prev.min > 0) return { ...prev, min: prev.min - 1, sec: 59 };
              // Timer finished
              setPomodoroCount(c => c + 1);
              return { min: 25, sec: 0, running: false };
            });
          }, 1000);
        }
        return () => clearInterval(timer);
      }, [tomato.running]);
      
      const toggleTimer = () => {
        setTomato(prev => ({ ...prev, running: !prev.running }));
      };
      
      const resetTimer = () => {
        setTomato({ min: 25, sec: 0, running: false });
      };
      
      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="text-center mb-10">
            <h2 className="text-4xl md:text-5xl font-bold mb-4 text-gray-800">🎯 工具箱</h2>
            <p className="text-gray-600 text-lg">实用小工具集合，提升效率</p>
          </div>
          
          <div className="grid md:grid-cols-2 gap-8">
            {/* Tomato Timer */}
            <div className="cartoon-card bg-red-100 rounded-3xl p-6 md:p-8">
              <h3 className="text-2xl font-bold mb-6 text-center text-gray-800">🍅 番茄工作法</h3>
              <div className="text-center">
                <div className={`text-7xl md:text-8xl font-bold mb-6 font-mono ${tomato.running ? 'text-red-600' : 'text-gray-800'}`}>
                  {String(tomato.min).padStart(2, '0')}:{String(tomato.sec).padStart(2, '0')}
                </div>
                <div className="flex justify-center gap-4 mb-6">
                  <button 
                    onClick={toggleTimer}
                    className={`cartoon-btn px-8 py-4 rounded-2xl font-bold text-xl text-white ${
                      tomato.running ? 'bg-yellow-500 hover:bg-yellow-600' : 'bg-green-500 hover:bg-green-600'
                    }`}
                  >
                    {tomato.running ? '⏸️ 暂停' : '▶️ 开始'}
                  </button>
                  <button 
                    onClick={resetTimer}
                    className="cartoon-btn bg-gray-500 text-white px-8 py-4 rounded-2xl font-bold text-xl hover:bg-gray-600"
                  >
                    🔄 重置
                  </button>
                </div>
                <div className="bg-white rounded-2xl p-4 border-2 border-black">
                  <p className="text-gray-600 mb-2">今日完成番茄数</p>
                  <p className="text-4xl font-bold text-red-600">{pomodoroCount} 🍅</p>
                </div>
              </div>
            </div>
            
            {/* Daily Quote */}
            <div className="cartoon-card bg-blue-100 rounded-3xl p-6 md:p-8">
              <h3 className="text-2xl font-bold mb-6 text-center text-gray-800">💭 每日一言</h3>
              <div className="bg-white rounded-2xl p-8 text-center cartoon-card min-h-[200px] flex flex-col justify-center">
                <p className="text-2xl font-bold text-gray-800 mb-6 leading-relaxed">{quote}</p>
                <button 
                  onClick={() => setQuote(quotes[Math.floor(Math.random() * quotes.length)])}
                  className="cartoon-btn bg-blue-500 text-white px-6 py-3 rounded-2xl font-bold text-lg hover:bg-blue-600"
                >
                  🎲 换一句
                </button>
              </div>
            </div>
            
            {/* Skill Radar */}
            <div className="cartoon-card bg-green-100 rounded-3xl p-6 md:p-8 md:col-span-2">
              <h3 className="text-2xl font-bold mb-6 text-gray-800">🎯 技能雷达</h3>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {[
                  { skill: '数据分析', level: 90, color: 'from-blue-400 to-cyan-400' },
                  { skill: '产品设计', level: 85, color: 'from-green-400 to-teal-400' },
                  { skill: 'Python', level: 75, color: 'from-yellow-400 to-orange-400' },
                  { skill: 'SQL', level: 80, color: 'from-purple-400 to-pink-400' },
                  { skill: 'Tableau', level: 70, color: 'from-indigo-400 to-blue-400' },
                  { skill: 'Axure', level: 75, color: 'from-red-400 to-pink-400' },
                  { skill: '数据治理', level: 85, color: 'from-teal-400 to-green-400' },
                  { skill: '项目管理', level: 80, color: 'from-orange-400 to-red-400' }
                ].map((item, idx) => (
                  <div key={idx} className="bg-white rounded-xl p-4 cartoon-card">
                    <div className="flex justify-between mb-3">
                      <span className="font-bold text-gray-800">{item.skill}</span>
                      <span className="font-bold text-gray-600">{item.level}%</span>
                    </div>
                    <div className="progress-bar">
                      <div 
                        className={`progress-fill bg-gradient-to-r ${item.color}`}
                        style={{ width: `${item.level}%` }}
                      ></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            
            {/* Health Tips */}
            <div className="cartoon-card bg-yellow-100 rounded-3xl p-6 md:p-8 md:col-span-2">
              <h3 className="text-2xl font-bold mb-4 text-gray-800">🍃 健康小贴士</h3>
              <div className="grid md:grid-cols-3 gap-4">
                <div className="bg-white rounded-xl p-4 cartoon-card">
                  <div className="text-3xl mb-2">🌙</div>
                  <p className="font-bold text-gray-800">作息</p>
                  <p className="text-sm text-gray-600">22:30前上床，保证7-8小时睡眠</p>
                </div>
                <div className="bg-white rounded-xl p-4 cartoon-card">
                  <div className="text-3xl mb-2">🍚</div>
                  <p className="font-bold text-gray-800">饮食</p>
                  <p className="text-sm text-gray-600">三餐规律，晚餐清淡少量</p>
                </div>
                <div className="bg-white rounded-xl p-4 cartoon-card">
                  <div className="text-3xl mb-2">🚶</div>
                  <p className="font-bold text-gray-800">运动</p>
                  <p className="text-sm text-gray-600">饭后百步走，每天泡脚15分钟</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==================== 主应用 ====================
    const App = () => {
      const [activeTab, setActiveTab] = useState('claw');
      
      return (
        <div className="min-h-screen bg-yellow-50">
          <Nav activeTab={activeTab} setActiveTab={setActiveTab} />
          
          <main className="py-6 md:py-8">
            <div className={`section ${activeTab === 'claw' ? 'active' : ''}`}>
              <ClawDiary />
            </div>
            <div className={`section ${activeTab === 'profile' ? 'active' : ''}`}>
              <Profile />
            </div>
            <div className={`section ${activeTab === 'works' ? 'active' : ''}`}>
              <Works />
            </div>
            <div className={`section ${activeTab === 'stocks' ? 'active' : ''}`}>
              <StockAnalysis />
            </div>
            <div className={`section ${activeTab === 'tools' ? 'active' : ''}`}>
              <Tools />
            </div>
          </main>
          
          <footer className="bg-white border-t-4 border-black mt-12 py-8">
            <div className="max-w-7xl mx-auto px-4 text-center">
              <p className="text-gray-600 text-lg mb-2">© 2026 猫哥的Claw养成日记 🐱</p>
              <p className="text-gray-500">Built with ❤️ by K嗨 & @catbot</p>
              <div className="mt-4 flex justify-center gap-4">
                <a href="https://blog.csdn.net/Mr_charm" target="_blank" className="text-blue-500 hover:underline">CSDN博客</a>
                <span className="text-gray-400">|</span>
                <span className="text-gray-600">最后更新：2026-03-10</span>
              </div>
            </div>
          </footer>
        </div>
      );
    };
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
